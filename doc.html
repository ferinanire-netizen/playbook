<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Playbook</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      display: flex;
    }

    .sidebar {
      width: 260px;
      height: 100vh;
      background-color: #111827;
      color: white;
      padding: 20px;
      position: fixed;
      overflow-y: auto;
    }

    .sidebar h1 {
      font-size: 18px;
      margin-bottom: 25px;
    }

    .menu-item {
      cursor: pointer;
      padding: 10px 0;
      color: #d1d5db;
    }

    .menu-item:hover {
      color: white;
    }

    .submenu {
      display: none;
      margin-left: 10px;
    }

    .submenu .submenu {
      margin-left: 15px;
    }

    .submenu a {
      display: block;
      padding: 6px 0;
      font-size: 14px;
      color: #9ca3af;
      text-decoration: none;
    }

    .submenu a:hover {
      color: white;
    }

    .content {
      margin-left: 260px;
      flex: 1;
      background-color: #f9fafb;
      display: flex;
      flex-direction: column;
    }

    .header {
      background-color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: center;
      gap: 30px;
      border-bottom: 1px solid #e5e7eb;
    }

    .main {
      padding: 30px;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h1>Playbook Route</h1>

  <!-- Dashboard -->
  <div class="menu-item" onclick="toggleMenu('dashboardMenu')">Dashboard ▾</div>
  <div id="dashboardMenu" class="submenu">
    <a href="/playbook/index.html">Plays Summary</a>
    <a href="#">Changes</a>
    <a href="#">Modified</a>
  </div>

  <!-- Routes -->
  <div class="menu-item" onclick="toggleMenu('routesMenu')">Routes ▾</div>
  <div id="routesMenu" class="submenu">

    <!-- North -->
    <div onclick="toggleMenu('northMenu')">North ▾</div>
    <div id="northMenu" class="submenu">
      <a href="/playbook/doc/cobragold.html">Cobra Gold</a>
      <a href="/playbook/doc/cope.html">Cope Tiger</a>
      <a href="/playbook/doc/falcon.html">Falcon Strike</a>
      <a href="/playbook/doc/csar.html">CSAR</a>
      <a href="/playbook/doc/cas.html">CAS</a>
    </div>

    <!-- South -->
    <div onclick="toggleMenu('southMenu')">South ▾</div>
    <div id="southMenu" class="submenu">
      <a href="/playbook/doc/dact.html">DACT / IN-SITU</a>
      <a href="/playbook/doc/rtf.html">RTAF Combat Readiness</a>
    </div>

  </div>

  <!-- Other -->
  <div class="menu-item">Settings</div>
</div>

<!-- CONTENT -->
<div class="content">

  <div class="header">
    <a href="#">Contact</a>
    <a href="#">Link</a>
  </div>

  <div class="main">
    <h2>DACT / IN-SITU</h2>
    <p>This is your content page.</p>
  </div>

</div>

<!-- SCRIPT -->
<script>
  function toggleMenu(id) {
    const menu = document.getElementById(id);
    menu.style.display = menu.style.display === "block" ? "none" : "block";
  }
</script>

</body>
</html>
