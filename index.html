<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playbook Route</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  height: 100vh;
  background-color: #111827;
  color: white;
  padding: 20px;
  box-sizing: border-box;
  overflow-y: auto;

  position: relative;
  z-index: 10; /* FIX click issue */
}

.sidebar h1 {
  font-size: 18px;
  margin-bottom: 25px;
}

.menu-item {
  cursor: pointer;
  padding: 10px 0;
  color: #d1d5db;
}

.menu-item:hover {
  color: white;
}

.submenu {
  display: none;
  margin-left: 10px;
}

.submenu div {
  padding: 6px 0;
  font-size: 14px;
  color: #9ca3af;
  cursor: pointer;
}

.submenu div:hover {
  color: white;
}

/* CONTENT */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
.header {
  background-color: white;
  padding: 15px 30px;
  display: flex;
  justify-content: center;
  gap: 30px;
  border-bottom: 1px solid #e5e7eb;
}

.header a {
  text-decoration: none;
  color: #374151;
}

.header a:hover {
  color: #111827;
}

/* MAIN */
.main {
  flex: 1;
  padding: 0; /* important */
}

/* IFRAME */
#contentFrame {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h1>Playbook Route</h1>

  <div class="menu-item" onclick="toggleMenu('routesMenu')">Routes ▾</div>
  <div id="routesMenu" class="submenu">

    <div onclick="toggleMenu('northMenu')">North ▾</div>
    <div id="northMenu" class="submenu">
      <div onclick="loadPage('doc/cg.html')">Cobra Gold</div>
      <div onclick="loadPage('doc/ct.html')">Cope Tiger</div>
      <div onclick="loadPage('doc/falcon.html')">Falcon Strike</div>
      <div onclick="loadPage('doc/csar.html')">CSAR</div>
      <div onclick="loadPage('doc/cas.html')">CAS</div>
      <div onclick="loadPage('doc/elang.html')">Elang Thainesia</div>
      <div onclick="loadPage('doc/boomerang.html')">Thai Boomerang</div>
      <div onclick="loadPage('doc/enduring.html')">Enduring Partners</div>
      <div onclick="loadPage('doc/thamal.html')">Air Thamal</div>
      <div onclick="loadPage('doc/thaising.html')">Air Thaising</div>
      <div onclick="loadPage('doc/nightops.html')">Night Operation</div>
      <div onclick="loadPage('doc/awc.html')">AWC</div>
    </div>

    <div onclick="toggleMenu('southMenu')">South ▾</div>
    <div id="southMenu" class="submenu">
      <div onclick="loadPage('doc/dact.html')">DACT / IN-SITU</div>
    </div>

  </div>
</div>

<!-- Content -->
<div class="content">

  <div class="header">
    <a href="#">Contact</a>
    <a href="#">Link</a>
  </div>

  <div class="main">
    <iframe id="contentFrame"></iframe>
  </div>

</div>

<script>
function toggleMenu(id) {
  const menu = document.getElementById(id);
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function loadPage(page) {
  document.getElementById("contentFrame").src = page;
}

/* Load default page */
window.onload = function () {
  loadPage('doc/cg.html');
};
</script>

</body>
</html>
