  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      display: flex;
    }

    .sidebar {
      width: 260px;
      height: 100vh;
      background-color: #111827;
      color: white;
      padding: 20px;
      box-sizing: border-box;
    }

    .sidebar h1 {
      font-size: 18px;

  overflow-y: auto;
    }

    .menu-item {
      cursor: pointer;
      padding: 10px 0;
      color: #d1d5db;
    }

    .menu-item:hover {

    }

    }

    .submenu div {
      padding: 6px 0;

    }

    .content {
      flex: 1;
      background-color: #f9fafb;
      display: flex;
      flex-direction: column;
    }

    .header {
      background-color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: center;
      gap: 30px;
      border-bottom: 1px solid #e5e7eb;

    .header a {

      color: #374151;

    }

    .header a:hover {
      color: #111827;
    }

    .main {
      padding: 30px;
    }
	  .submenu a {
  text-decoration: none;

}

.submenu a:hover {

}
